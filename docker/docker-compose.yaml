version: '3.3'

services:
  verifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: verifier-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      VERIFIER_PUBLICURL: "${PUBLIC_URL:-http://localhost}"
      VERIFIER_RESPONSE_MODE: "DirectPostJwt"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-dev}"
      # Native backend dev defaults to port 3008; override when targeting a containerized backend.
      AUTHBOUND_BACKEND_URL: "${AUTHBOUND_BACKEND_URL:-http://host.docker.internal:3008}"
      AUTHBOUND_BACKEND_INTERNALTOKEN: "${INTERNAL_SERVICE_TOKEN:-}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  verifier-ui:
    image: ghcr.io/eu-digital-identity-wallet/eudi-web-verifier:latest  # Keep reference UI for now
    container_name: verifier-ui
    restart: unless-stopped
    ports:
      - "4300:4300"
    environment:
      - DOMAIN_NAME="${DOMAIN_NAME:-localhost}"
      - HOST_API="${PUBLIC_URL:-http://localhost}"
    depends_on:
      - verifier

  haproxy:
    image: haproxy:2.8-alpine  # Using newer Alpine-based version
    container_name: haproxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./haproxy.conf:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy.pem:/etc/ssl/certs/mysite.pem:ro
    depends_on:
      - verifier
      - verifier-ui
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 10s
      retries: 3
