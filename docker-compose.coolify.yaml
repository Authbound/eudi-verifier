# EUDI Verifier — Coolify Production Stack
# Based on infra/compose/non-js.yaml, adapted for Coolify deployment.
# Includes Redis (required for verifier session persistence).
#
# Required env vars (set via Coolify UI):
#   DOMAIN                - Base domain (e.g. authbound.io)
#   REDIS_PASSWORD        - Redis auth password
#   AUTHBOUND_BACKEND_URL - Backend URL for wallet response callbacks
#   INTERNAL_SERVICE_TOKEN - S2S auth token for backend callbacks
#   EUDI_S2S_JWKS_URL     - Gateway JWKS endpoint for JWT validation
#   EUDI_S2S_ISSUER       - Expected JWT issuer (gateway URL)

services:
  redis:
    image: redis:7-alpine
    container_name: eudi-redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - coolify
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  eudi-verifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eudi-verifier
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - coolify
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"

      # --- Public URL & Response ---
      VERIFIER_PUBLICURL: "https://eudi-verifier.${DOMAIN}"
      VERIFIER_RESPONSE_MODE: "DirectPostJwt"
      VERIFIER_CLIENTIDPREFIX: "${VERIFIER_CLIENTIDPREFIX:-pre-registered}"
      VERIFIER_ORIGINALCLIENTID: "${VERIFIER_ORIGINALCLIENTID:-Verifier}"

      # --- Redis (session persistence) ---
      SPRING_DATA_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      SPRING_DATA_REDIS_SSL_ENABLED: "false"

      # --- Backend callback (verifier pushes wallet responses to backend) ---
      AUTHBOUND_BACKEND_URL: "${AUTHBOUND_BACKEND_URL}"
      AUTHBOUND_BACKEND_INTERNALTOKEN: "${INTERNAL_SERVICE_TOKEN}"

      # --- S2S JWT (gateway → verifier authentication) ---
      EUDI_S2S_JWKS_URL: "${EUDI_S2S_JWKS_URL}"
      EUDI_S2S_ISSUER: "${EUDI_S2S_ISSUER}"

      # --- Trust sources (default to the bundled issuer truststore) ---
      VERIFIER_TRUSTSOURCES_0_PATTERN: "${VERIFIER_TRUSTSOURCES_0_PATTERN:-.*}"
      VERIFIER_TRUSTSOURCES_0_KEYSTORE_PATH: "${VERIFIER_TRUSTSOURCES_0_KEYSTORE_PATH:-classpath:trusted-issuers.jks}"
      VERIFIER_TRUSTSOURCES_0_KEYSTORE_TYPE: "${VERIFIER_TRUSTSOURCES_0_KEYSTORE_TYPE:-JKS}"
      VERIFIER_TRUSTSOURCES_0_KEYSTORE_PASSWORD: "${VERIFIER_TRUSTSOURCES_0_KEYSTORE_PASSWORD:-}"

      # --- JAR signing (production-safe default uses AWS KMS) ---
      VERIFIER_JAR_SIGNING_KEY: "${VERIFIER_JAR_SIGNING_KEY:-AwsKms}"
      VERIFIER_JAR_SIGNING_KEY_KMS_KEY_ID: "${VERIFIER_JAR_SIGNING_KEY_KMS_KEY_ID:-}"
      VERIFIER_JAR_SIGNING_KEY_KMS_REGION: "${VERIFIER_JAR_SIGNING_KEY_KMS_REGION:-}"
      VERIFIER_JAR_SIGNING_KEY_KMS_KID: "${VERIFIER_JAR_SIGNING_KEY_KMS_KID:-}"
      VERIFIER_JAR_SIGNING_CERT_CHAIN_SOURCE: "${VERIFIER_JAR_SIGNING_CERT_CHAIN_SOURCE:-Disabled}"
      VERIFIER_JAR_SIGNING_CERT_CHAIN_FILE: "${VERIFIER_JAR_SIGNING_CERT_CHAIN_FILE:-}"
      VERIFIER_JAR_SIGNING_CERT_CHAIN_PEM: "${VERIFIER_JAR_SIGNING_CERT_CHAIN_PEM:-}"
      AWS_ACCESS_KEY_ID: "${EUDI_VERIFIER_AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${EUDI_VERIFIER_AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${EUDI_VERIFIER_AWS_REGION:-eu-west-1}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
volumes:
  redis_data:

networks:
  coolify:
    external: true
