#
# Example profile for AWS KMS signing with x509_san_dns verifier identity.
# The private key remains in AWS KMS. Supply the public certificate chain separately.
#
verifier.originalClientId=localhost
verifier.clientIdPrefix=x509_san_dns
verifier.jar.signing.algorithm=ES256
verifier.jar.signing.key=AwsKms
verifier.jar.signing.cert.chain.source=File
